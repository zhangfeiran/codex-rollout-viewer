name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Check
        run: npm run check

      - name: Export Pages
        run: npm run export:pages
        env:
          CODEX_ROLLOUT_PAGES_DIR: ${{ runner.temp }}/codex-rollout-viewer-pages

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ runner.temp }}/codex-rollout-viewer-pages

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
