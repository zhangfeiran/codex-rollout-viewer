      updateDefaultPathHint();
    }

    async function loadRolloutSources(sources, label) {
      const items = [];
      let scanned = 0;
      let skipped = 0;
      setStatus(`Scanning ${label}...`);
      for await (const source of sources) {
        scanned += 1;
        if (scanned % 20 === 0) {
          setStatus(`Scanning ${label}: ${formatNumber(scanned)} JSONL files...`);
        }
        try {
          const item = await createRolloutIndexItem(source, scanned);
          if (item) {
            items.push(item);
          } else {
            skipped += 1;
          }
        } catch (error) {
          skipped += 1;
          console.warn("[codex-rollout-viewer] Could not index rollout", source.path || source.name, error);
        }
      }
      const notice = skipped
        ? `Indexed ${formatNumber(items.length)} rollouts; skipped ${formatNumber(skipped)} non-rollout or unreadable JSONL files.`
        : `Indexed ${formatNumber(items.length)} rollouts.`;
      indexCwdFilter = "";
      renderRolloutIndex(items, label, notice);
    }

    async function loadDirectoryHandle(directoryHandle, label = directoryHandle.name || ".codex/sessions") {
      if (!await requestReadPermission(directoryHandle)) {
        setStatus("Folder permission was not granted.", true);
        return;
      }
      await saveDirectoryHandle(directoryHandle);
      savedDirectoryHandle = directoryHandle;
      await loadRolloutSources(walkDirectoryHandle(directoryHandle), label);
    }

    async function chooseSessionsDirectory() {
      if (!window.showDirectoryPicker) {
        setStatus("Directory picker is unavailable in this browser. Use Choose folder instead.", true);
        return;
      }
      try {
        const directoryHandle = await showDirectoryPicker({
          id: "codex-sessions",
          mode: "read"
        });
        await loadDirectoryHandle(directoryHandle, directoryHandle.name || ".codex/sessions");
      } catch (error) {
        if (error?.name !== "AbortError") {
          setStatus(`Could not open folder: ${error?.message || error}`, true);
        }
      }
    }

    async function chooseJsonlFile() {
      if (!window.showOpenFilePicker) {
        setStatus("File picker is unavailable in this browser. Use Choose JSONL file instead.", true);
        return;
      }
      try {
        const [fileHandle] = await showOpenFilePicker({
          id: "codex-rollout-jsonl",
          multiple: false,
          types: [{
            description: "Codex rollout JSONL",
            accept: {
              "application/json": [".jsonl"],
              "text/plain": [".jsonl"]
            }
          }]
        });
        if (!fileHandle || !isJsonlFileName(fileHandle.name)) {
          setStatus("Choose a .jsonl file.", true);
          return;
        }
        if (!await requestReadPermission(fileHandle)) {
          setStatus("File permission was not granted.", true);
          return;
        }
        rolloutIndex = [];
        await renderSource(createSourceFromFileHandle(fileHandle, fileHandle.name));
      } catch (error) {
        if (error?.name !== "AbortError") {
          setStatus(`Could not open JSONL file: ${error?.message || error}`, true);
        }
      }
    }

    async function loadSavedDirectory() {
      if (!savedDirectoryHandle) {
        savedDirectoryHandle = await getSavedDirectoryHandle();
      }
      document.querySelectorAll("[data-saved-directory]").forEach(button => {
        button.hidden = !savedDirectoryHandle;
      });
      if (!savedDirectoryHandle) {
        return;
      }
      if (await hasReadPermission(savedDirectoryHandle)) {
        await loadDirectoryHandle(savedDirectoryHandle, `${savedDirectoryHandle.name || ".codex/sessions"} (saved)`);
      } else {
        setStatus("Saved sessions folder found. Reuse it to grant access again.");
      }
    }

    async function restoreCurrentRollout() {
      const saved = await getSavedCurrentRollout();
      if (!saved || saved.kind === "transient") {
        return false;
      }
      if (saved.kind === "file" && saved.fileHandle) {
        if (!await hasReadPermission(saved.fileHandle)) {
          return false;
        }
        await renderSource(createSourceFromFileHandle(saved.fileHandle, saved.path || saved.name), {
          skipRemember: true
        });
        return true;
      }
      if (saved.kind === "directory" && saved.path) {
        if (!savedDirectoryHandle) {
          savedDirectoryHandle = await getSavedDirectoryHandle();
        }
        if (!savedDirectoryHandle || !await hasReadPermission(savedDirectoryHandle)) {
          return false;
        }
        const fileHandle = await getFileHandleByPath(savedDirectoryHandle, saved.path);
        if (!fileHandle) {
          return false;
        }
        await renderSource(createSourceFromFileHandle(fileHandle, saved.path), {
          skipRemember: true
        });
        return true;
      }
      return false;
    }

    function getSourceStateId(source) {
      return source?.path || source?.name || "";
    }

    function getDiffMode(diff) {
      return diff.classList.contains("is-split") ? "split" : "unified";
    }

    function sanitizeRenderedDetailsState(details) {
      return Object.fromEntries(
        Object.entries(details || {}).filter(([key]) => !String(key).endsWith(":nav"))
      );
    }

    function scrollToDocumentEndSoon() {
      const scroll = () => {
        window.scrollTo({
          top: Math.max(document.body.scrollHeight, document.documentElement.scrollHeight),
          left: 0,
          behavior: "auto"
        });
      };
      requestAnimationFrame(() => {
        scroll();
        requestAnimationFrame(scroll);
        setTimeout(scroll, 250);
      });
    }

    function captureRenderedUiState(source) {
      const details = {};
      document.querySelectorAll("details[data-rollout-state-key]").forEach(node => {
        if (node.closest(".rollout-sidebar")) {
          return;
        }
        details[node.dataset.rolloutStateKey] = node.open;
      });
      const diffModes = {};
      document.querySelectorAll("[data-rollout-diff][data-rollout-state-key]").forEach(node => {
        if (node.closest(".rollout-sidebar")) {
          return;
        }
        diffModes[node.dataset.rolloutStateKey] = getDiffMode(node);
      });
      return {
        sourceId: getSourceStateId(source),
        savedAt: Date.now(),
        details,
        diffModes
      };
    }

    function applyDiffMode(diff, mode) {
      const normalized = mode === "split" ? "split" : "unified";
      diff.classList.toggle("is-unified", normalized === "unified");
      diff.classList.toggle("is-split", normalized === "split");
      diff.querySelectorAll("[data-rollout-diff-mode]").forEach(button => {
        button.setAttribute("aria-pressed", String(button.dataset.rolloutDiffMode === normalized));
      });
    }

    function restoreRenderedUiState(state, source) {
      if (!state || state.sourceId !== getSourceStateId(source)) {
        currentRenderedUiState = {
          sourceId: getSourceStateId(source),
          savedAt: Date.now(),
          details: {},
          diffModes: {}
        };
        return;
      }
      currentRenderedUiState = {
        sourceId: state.sourceId,
        savedAt: Date.now(),
        details: sanitizeRenderedDetailsState(state.details),
        diffModes: { ...(state.diffModes || {}) }
      };
      isRestoringRenderedUiState = true;
      document.documentElement.dataset.rolloutRestoringState = "true";
      const restoreDetails = () => {
        document.querySelectorAll("details[data-rollout-state-key]").forEach(node => {
          if (node.closest(".rollout-sidebar")) {
            return;
          }
          const key = node.dataset.rolloutStateKey;
          if (Object.prototype.hasOwnProperty.call(currentRenderedUiState.details, key)) {
            node.open = Boolean(currentRenderedUiState.details[key]);
          }
        });
      };
      const restoreDiffModes = () => {
        document.querySelectorAll("[data-rollout-diff][data-rollout-state-key]").forEach(node => {
          if (node.closest(".rollout-sidebar")) {
            return;
          }
          const key = node.dataset.rolloutStateKey;
          if (Object.prototype.hasOwnProperty.call(currentRenderedUiState.diffModes, key)) {
            applyDiffMode(node, currentRenderedUiState.diffModes[key]);
          }
        });
      };
      try {
        restoreDetails();
        document.dispatchEvent(new CustomEvent("codex-rollout-render-open-lazy", {
          detail: { defer: false, kind: "sidebar" }
        }));
        document.dispatchEvent(new CustomEvent("codex-rollout-render-open-lazy", {
          detail: { defer: false, kind: "turn" }
        }));
        restoreDetails();
        restoreDiffModes();
      } finally {
        delete document.documentElement.dataset.rolloutRestoringState;
      }
      setTimeout(() => {
        isRestoringRenderedUiState = false;
        document.dispatchEvent(new CustomEvent("codex-rollout-render-open-lazy", {
          detail: { defer: true, kind: "content" }
        }));
        scrollToDocumentEndSoon();
      }, 0);
    }

    function persistRenderedUiStateSoon(source) {
      clearTimeout(persistRenderedUiStateSoon.timer);
      persistRenderedUiStateSoon.timer = setTimeout(() => {
        if (currentRenderedUiState) {
          currentRenderedUiState.savedAt = Date.now();
          saveCurrentRolloutUiState(currentRenderedUiState);
        } else {
          saveCurrentRolloutUiState(captureRenderedUiState(source));
        }
      }, 120);
    }

    function ensureRenderedUiStatePersistenceInstalled() {
      if (renderedUiStatePersistenceInstalled) {
        return;
      }
      renderedUiStatePersistenceInstalled = true;
      document.addEventListener("toggle", event => {
        const node = event.target;
        if (isRestoringRenderedUiState || !(node instanceof HTMLDetailsElement) || !node.dataset.rolloutStateKey || node.closest(".rollout-sidebar") || !currentRenderedSource) {
          return;
        }
        currentRenderedUiState ||= {
          sourceId: getSourceStateId(currentRenderedSource),
          savedAt: Date.now(),
          details: {},
          diffModes: {}
        };
        currentRenderedUiState.details[node.dataset.rolloutStateKey] = node.open;
        persistRenderedUiStateSoon(currentRenderedSource);
      }, true);
      document.addEventListener("click", event => {
        if (isRestoringRenderedUiState || !currentRenderedSource) {
          return;
        }
        const button = event.target.closest("[data-rollout-diff-mode]");
        if (!button) {
          return;
        }
        const diff = button.closest("[data-rollout-diff][data-rollout-state-key]");
        if (!diff || diff.closest(".rollout-sidebar")) {
          return;
        }
        currentRenderedUiState ||= {
          sourceId: getSourceStateId(currentRenderedSource),
          savedAt: Date.now(),
          details: {},
          diffModes: {}
        };
        currentRenderedUiState.diffModes[diff.dataset.rolloutStateKey] = getDiffMode(diff);
        persistRenderedUiStateSoon(currentRenderedSource);
      });
    }

    async function rememberRenderedSource(source) {
      if (source.fileHandle) {
        await saveCurrentRollout({
          kind: "file",
          name: source.name,
          path: source.path || source.name,
          fileHandle: source.fileHandle
        });
      } else {
        await saveCurrentRollout({
          kind: "transient",
          name: source.name,
          path: source.path || source.name
        });
      }
    }

    async function renderSource(source, options = {}) {
      clearTimeout(persistRenderedUiStateSoon.timer);
      currentRenderedSource = null;
      currentRenderedUiState = null;
      setStatus(`Reading ${source.name}...`);
      let text = "";
      try {
        text = await source.getText();
      } catch (error) {
        setStatus(`Could not read ${source.name}: ${error?.message || error}`, true);
        return;
      }
      const result = await renderCodexRolloutJsonlText(text, {
        fileName: source.name,
        sourceUrl: source.path || source.name
      });
      if (!result.rendered) {
        renderHome();
        setStatus(`${source.name} does not look like a Codex rollout JSONL file.`, true);
        return;
      }
      if (!options.skipRemember) {
        await rememberRenderedSource(source);
      }
      installRenderToolbar(source.name);
      restoreRenderedUiState(await getSavedCurrentRolloutUiState(), source);
      currentRenderedSource = source;
      ensureRenderedUiStatePersistenceInstalled();
      scrollToDocumentEndSoon();
    }

    async function renderIndexedRollout(id) {
      const item = rolloutIndex.find(candidate => candidate.id === id);
      if (!item) {
        return;
      }
      await renderSource(item.source);
    }

    function setIndexSort(key) {
      if (indexSort.key === key) {
        indexSort = {
          key,
          direction: indexSort.direction === "asc" ? "desc" : "asc"
        };
      } else {
        indexSort = {
          key,
          direction: key === "created" || key === "modified" ? "desc" : "asc"
        };
      }
      renderRolloutIndex(rolloutIndex, currentIndexLabel || "Codex rollout sessions", currentIndexNotice);
    }

    function installRenderToolbar(label) {
      const style = document.createElement("style");
      style.textContent = `
        .standalone-render-toolbar {
          display: flex;
          flex-wrap: wrap;
          gap: 8px;
          align-items: center;
          min-height: 36px;
          padding: 6px 10px;
          color: #97a3b0;
          background: #0f141b;
          border-bottom: 1px solid #242c36;
          font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
        }
        .standalone-render-toolbar button {
          min-height: 24px;
          padding: 3px 8px;
          color: #e7edf5;
          background: #10161d;
          border: 1px solid #303844;
          border-radius: 5px;
          cursor: pointer;
          font: inherit;
          font-weight: 650;
        }
        .standalone-render-toolbar span {
          min-width: 0;
          overflow-wrap: anywhere;
        }
      `;
      const toolbar = document.createElement("nav");
      toolbar.className = "standalone-render-toolbar";
      toolbar.setAttribute("aria-label", "Standalone viewer navigation");
      const button = document.createElement("button");
      button.type = "button";
      button.dataset.backIndex = "true";
      button.textContent = rolloutIndex.length ? "Back to index" : "Back";
      const text = document.createElement("span");
      text.textContent = label;
      toolbar.append(style, button, text);
      document.body.prepend(toolbar);
    }

    document.addEventListener("click", event => {
      const rolloutButton = event.target.closest("[data-rollout-id]");
      if (rolloutButton) {
        renderIndexedRollout(rolloutButton.dataset.rolloutId);
        return;
      }
      const sortButton = event.target.closest("[data-sort-key]");
      if (sortButton) {
        setIndexSort(sortButton.dataset.sortKey);
        return;
      }
      if (event.target.closest("[data-open-sessions-directory]")) {
        chooseSessionsDirectory();
        return;
      }
      if (event.target.closest("[data-open-jsonl-file]")) {
        chooseJsonlFile();
        return;
      }
      if (event.target.closest("[data-saved-directory]")) {
        if (savedDirectoryHandle) {
          loadDirectoryHandle(savedDirectoryHandle, `${savedDirectoryHandle.name || ".codex/sessions"} (saved)`);
        }
        return;
      }
      if (event.target.closest("[data-back-index]")) {
        if (currentRenderedSource) {
          saveCurrentRolloutUiState(currentRenderedUiState || captureRenderedUiState(currentRenderedSource));
          currentRenderedSource = null;
          currentRenderedUiState = null;
        }
        if (rolloutIndex.length) {
          renderRolloutIndex(rolloutIndex, currentIndexLabel || "Codex rollout sessions", currentIndexNotice);
        } else {
          renderHome();
        }
      }
    });

    window.addEventListener("beforeunload", () => {
      if (currentRenderedSource) {
        saveCurrentRolloutUiState(currentRenderedUiState || captureRenderedUiState(currentRenderedSource));
      }
    });

    document.addEventListener("change", event => {
      if (event.target.matches("[data-cwd-filter]")) {
        indexCwdFilter = event.target.value;
        renderRolloutIndex(rolloutIndex, currentIndexLabel || "Codex rollout sessions", currentIndexNotice);
      } else if (event.target.matches("[data-cwd-sort]")) {
        indexCwdSort = event.target.value === "name" ? "name" : "modified";
        renderRolloutIndex(rolloutIndex, currentIndexLabel || "Codex rollout sessions", currentIndexNotice);
      } else if (event.target.matches("[data-file-input]")) {
        const sources = getSourcesFromFiles(event.target.files || []);
        event.target.value = "";
        if (sources.length === 1) {
          rolloutIndex = [];
          renderSource(sources[0]);
        } else {
          loadRolloutSources(sources, "Selected JSONL files");
        }
      } else if (event.target.matches("[data-folder-input]")) {
        const sources = getSourcesFromFiles(event.target.files || []);
        event.target.value = "";
        loadRolloutSources(sources, "Selected folder");
      }
    });

    document.addEventListener("dragover", event => {
      event.preventDefault();
      document.body?.classList.add("is-dragging");
    });

    document.addEventListener("dragleave", event => {
      if (!event.relatedTarget) {
        document.body?.classList.remove("is-dragging");
      }
    });

    document.addEventListener("drop", async event => {
      event.preventDefault();
      document.body?.classList.remove("is-dragging");
      const sources = await getSourcesFromDrop(event.dataTransfer);
      if (sources.length === 1) {
        rolloutIndex = [];
        renderSource(sources[0]);
      } else {
        await loadRolloutSources(sources, "Dropped files");
      }
    });

    updateDefaultPathHint();
    (async () => {
      if (!window.showOpenFilePicker) {
        document.querySelectorAll("[data-open-jsonl-file]").forEach(button => {
          button.hidden = true;
        });
        document.querySelectorAll("[data-file-input-fallback]").forEach(label => {
          label.hidden = false;
        });
      }
      if (!await restoreCurrentRollout()) {
        await loadSavedDirectory();
      }
    })();
  </script>
</body>
</html>
