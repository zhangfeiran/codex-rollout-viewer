<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Codex Rollout Viewer</title>
  <style>
    :root {
      color-scheme: dark;
      --standalone-bg: #0b0f14;
      --standalone-panel: #131922;
      --standalone-panel-strong: #18212c;
      --standalone-border: #303844;
      --standalone-fg: #e7edf5;
      --standalone-muted: #97a3b0;
      --standalone-subtle: #6f7b88;
      --standalone-blue: #58a6ff;
      --standalone-red: #ff6b6b;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-width: 280px;
      min-height: 100%;
      margin: 0;
      color: var(--standalone-fg);
      background: var(--standalone-bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.45;
    }

    .standalone-shell {
      display: grid;
      min-height: 100vh;
      place-items: center;
      padding: 22px;
    }

    .standalone-drop-zone {
      display: grid;
      gap: 14px;
      width: min(720px, 100%);
      padding: 28px;
      border: 1px dashed var(--standalone-border);
      border-radius: 8px;
      background: var(--standalone-panel);
    }

    body.is-dragging .standalone-drop-zone {
      border-color: var(--standalone-blue);
      background: var(--standalone-panel-strong);
    }

    .standalone-eyebrow {
      margin: 0;
      color: var(--standalone-subtle);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .standalone-drop-zone h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
    }

    .standalone-drop-zone p {
      margin: 0;
      color: var(--standalone-muted);
    }

    .standalone-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .standalone-file-button {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 5px 10px;
      color: var(--standalone-fg);
      background: #10161d;
      border: 1px solid var(--standalone-border);
      border-radius: 6px;
      cursor: pointer;
      font-weight: 650;
    }

    .standalone-file-button:hover {
      background: var(--standalone-panel-strong);
    }

    .standalone-file-button input {
      position: absolute;
      inline-size: 1px;
      block-size: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    .standalone-status {
      min-height: 20px;
      color: var(--standalone-subtle);
      overflow-wrap: anywhere;
    }

    .standalone-status.is-error {
      color: var(--standalone-red);
    }

    .standalone-file-button[hidden],
    [hidden] {
      display: none !important;
    }

    button.standalone-file-button {
      font: inherit;
    }

    .standalone-index-shell {
      min-height: 100vh;
      padding: 14px 18px 28px;
    }

    .standalone-index-header {
      display: grid;
      gap: 8px;
      padding-bottom: 12px;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--standalone-border);
    }

    .standalone-index-header h1 {
      margin: 0;
      font-size: 19px;
      line-height: 1.25;
    }

    .standalone-index-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 0;
      color: var(--standalone-muted);
      font-size: 11px;
    }

    .standalone-chip {
      display: inline-flex;
      align-items: center;
      min-height: 20px;
      padding: 1px 7px;
      border: 1px solid var(--standalone-border);
      border-radius: 999px;
      background: #10161d;
      color: var(--standalone-muted);
      font-size: 11px;
      font-weight: 650;
    }

    .standalone-index-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .standalone-index-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .standalone-filter-control {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      min-height: 32px;
      color: var(--standalone-muted);
      font-size: 12px;
      font-weight: 650;
    }

    .standalone-filter-control select {
      min-height: 32px;
      max-width: min(520px, 72vw);
      padding: 4px 8px;
      color: var(--standalone-fg);
      background: #10161d;
      border: 1px solid var(--standalone-border);
      border-radius: 6px;
      font: inherit;
      font-weight: 500;
    }

    .standalone-table-wrap {
      border: 1px solid var(--standalone-border);
      border-radius: 8px;
      background: var(--standalone-panel);
      overflow: auto;
    }

    .standalone-rollout-table {
      width: 100%;
      min-width: 1120px;
      border-collapse: collapse;
    }

    .standalone-rollout-table th,
    .standalone-rollout-table td {
      padding: 7px 9px;
      border-bottom: 1px solid rgba(48, 56, 68, 0.65);
      text-align: left;
      vertical-align: top;
    }

    .standalone-rollout-table th {
      position: sticky;
      top: 0;
      z-index: 1;
      color: var(--standalone-muted);
      background: var(--standalone-panel-strong);
      font-size: 11px;
      font-weight: 650;
      white-space: nowrap;
    }

    .standalone-rollout-table tbody tr:hover {
      background: rgba(88, 166, 255, 0.06);
    }

    .standalone-rollout-table tbody tr:last-child td {
      border-bottom: 0;
    }

    .standalone-sort-button {
      display: inline-flex;
      gap: 5px;
      align-items: center;
      padding: 0;
      color: inherit;
      background: transparent;
      border: 0;
      cursor: pointer;
      font: inherit;
      font-weight: inherit;
    }

    .standalone-sort-button:hover {
      color: var(--standalone-fg);
    }

    .standalone-sort-button.is-active {
      color: var(--standalone-blue);
    }

    .standalone-cell-title {
      min-width: 260px;
      max-width: 520px;
    }

    .standalone-cell-folder,
    .standalone-cell-cwd {
      max-width: 260px;
    }

    .standalone-cell-date {
      width: 148px;
      white-space: nowrap;
    }

    .standalone-cell-stats {
      width: 130px;
      color: var(--standalone-muted);
      white-space: nowrap;
    }

    .standalone-cell-cwd .standalone-path-text {
      color: var(--standalone-fg);
    }

    .standalone-path-text {
      color: var(--standalone-subtle);
      overflow-wrap: anywhere;
    }

    .standalone-rollout-title {
      display: inline;
      min-width: 0;
      padding: 0;
      color: var(--standalone-blue);
      background: transparent;
      border: 0;
      cursor: pointer;
      font: inherit;
      font-weight: 650;
      text-align: left;
      overflow-wrap: anywhere;
    }

    .standalone-rollout-title:hover {
      text-decoration: underline;
    }

    .standalone-rollout-subtitle {
      margin: 0;
      color: var(--standalone-subtle);
      font-size: 11px;
      overflow-wrap: anywhere;
    }

    .standalone-empty {
      margin: 0;
      color: var(--standalone-subtle);
    }
  </style>
</head>
<body>
  <main class="standalone-shell">
    <section class="standalone-drop-zone" data-drop-zone>
      <p class="standalone-eyebrow">Codex Rollout Viewer</p>
      <h1>Open Codex rollout sessions</h1>
      <p>Select <span data-default-sessions-path>.codex/sessions</span>, choose a folder, or drop JSONL files.</p>
      <div class="standalone-actions">
        <button class="standalone-file-button" type="button" data-open-sessions-directory>Open .codex/sessions</button>
        <button class="standalone-file-button" type="button" data-saved-directory hidden>Reuse saved folder</button>
        <button class="standalone-file-button" type="button" data-open-jsonl-file>Choose JSONL</button>
        <label class="standalone-file-button">
          <input type="file" webkitdirectory multiple data-folder-input>
          Choose folder
        </label>
        <label class="standalone-file-button" data-file-input-fallback>
          <input type="file" accept=".jsonl,application/json,application/jsonl" multiple data-file-input>
          Choose JSONL file
        </label>
      </div>
      <p class="standalone-status" data-status>Waiting for sessions access.</p>
    </section>
  </main>

  <script type="module">
/* BEGIN embedded rollout-renderer.js */
const SOURCE_META = "codex-rollout-source-url";
const CANONICAL_META = "codex-rollout-canonical-url";
const JSONL_FILE_PATTERN = /\.jsonl(?:$|[?#])/i;
const HIGHLIGHT_JS_VENDOR_PATH = "vendor/highlightjs/highlight.min.js";
const MAX_DETAILS_STRING_LENGTH = 8000;
const MAX_DISPLAY_TEXT_LENGTH = 120000;
const LONG_CONTENT_COLLAPSE_LENGTH = 2200;
const LONG_MESSAGE_COLLAPSE_LENGTH = LONG_CONTENT_COLLAPSE_LENGTH;
const LONG_OUTPUT_COLLAPSE_LENGTH = LONG_CONTENT_COLLAPSE_LENGTH;

let codeHighlightScriptPromise = null;
let lazyRolloutContentStore = new Map();

const ROLLOUT_CSS = `
:root {
  color-scheme: dark;
  --wh-rollout-bg: #0b0f14;
  --wh-rollout-sidebar: #0f141b;
  --wh-rollout-panel: #131922;
  --wh-rollout-panel-strong: #18212c;
  --wh-rollout-panel-soft: #10161d;
  --wh-rollout-border: #303844;
  --wh-rollout-border-muted: #242c36;
  --wh-rollout-fg: #e7edf5;
  --wh-rollout-muted: #97a3b0;
  --wh-rollout-subtle: #6f7b88;
  --wh-rollout-blue: #58a6ff;
  --wh-rollout-green: #3fb950;
  --wh-rollout-purple: #bc8cff;
  --wh-rollout-red: #ff6b6b;
  --wh-rollout-yellow: #d29922;
  --wh-rollout-cyan: #39c5cf;
}

html {
  background: var(--wh-rollout-bg);
}

body.codex-rollout-page {
  min-width: 280px;
  margin: 0;
  color: var(--wh-rollout-fg);
  background: var(--wh-rollout-bg);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
  font-size: 13px;
  line-height: 1.4;
}

.codex-rollout,
.codex-rollout *,
.codex-rollout *::before,
.codex-rollout *::after {
  box-sizing: border-box;
}

.codex-rollout {
  display: grid;
  grid-template-columns: 292px minmax(0, 1fr);
  min-height: 100vh;
}

.rollout-sidebar {
  position: sticky;
  top: 0;
  height: 100vh;
  min-width: 0;
  padding: 12px;
  overflow: auto;
  background: var(--wh-rollout-sidebar);
  border-right: 1px solid var(--wh-rollout-border-muted);
}

.rollout-main {
  min-width: 0;
  padding: 14px 18px 28px;
}

.rollout-hero {
  display: grid;
  gap: 8px;
  padding-bottom: 12px;
  margin-bottom: 12px;
  border-bottom: 1px solid var(--wh-rollout-border-muted);
}

.rollout-eyebrow {
  margin: 0;
  color: var(--wh-rollout-subtle);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0;
  text-transform: uppercase;
}

.rollout-hero h1 {
  margin: 0;
  overflow-wrap: anywhere;
  font-size: 18px;
  line-height: 1.25;
  font-weight: 650;
}

.rollout-subtitle,
.rollout-entry-meta,
.rollout-turn-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin: 0;
  color: var(--wh-rollout-muted);
  font-size: 11px;
}

.rollout-chip,
.rollout-role,
.rollout-line,
.rollout-count {
  display: inline-flex;
  align-items: center;
  min-height: 20px;
  padding: 1px 7px;
  border: 1px solid var(--wh-rollout-border);
  border-radius: 999px;
  background: var(--wh-rollout-panel-soft);
  color: var(--wh-rollout-muted);
  font-size: 11px;
  font-weight: 650;
}

.rollout-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(94px, 1fr));
  gap: 6px;
  margin: 0 0 12px;
}

.rollout-stat {
  min-width: 0;
  padding: 7px 8px;
  border: 1px solid var(--wh-rollout-border-muted);
  border-radius: 7px;
  background: var(--wh-rollout-panel-soft);
}

.rollout-stat-label {
  margin: 0 0 2px;
  color: var(--wh-rollout-subtle);
  font-size: 10px;
}

.rollout-stat-value {
  margin: 0;
  overflow-wrap: anywhere;
  font-size: 15px;
  line-height: 1.15;
  font-weight: 700;
}

.rollout-tree-title {
  margin: 2px 0 8px;
  color: var(--wh-rollout-muted);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
}

.rollout-tree-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin: 0 0 8px;
}

.rollout-tool-btn {
  flex: 1 1 74px;
  min-width: 0;
  min-height: 24px;
  padding: 3px 7px;
  color: var(--wh-rollout-muted);
  background: var(--wh-rollout-panel-soft);
  border: 1px solid var(--wh-rollout-border);
  border-radius: 5px;
  cursor: pointer;
  font: inherit;
  font-size: 11px;
  font-weight: 650;
}

.rollout-tool-btn:hover {
  color: var(--wh-rollout-fg);
  background: var(--wh-rollout-panel-strong);
}

.rollout-tree {
  display: grid;
  gap: 4px;
}

.rollout-tree a,
.rollout-tree summary {
  color: var(--wh-rollout-muted);
  text-decoration: none;
}

.rollout-tree a {
  display: block;
  min-width: 0;
  padding: 3px 6px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  border-radius: 5px;
}

.codex-rollout.rollout-nav-wrap .rollout-tree a,
.codex-rollout.rollout-nav-wrap .rollout-nav-label {
  overflow: visible;
  text-overflow: clip;
  white-space: normal;
  word-break: break-word;
}

.rollout-tree details[data-rollout-level="2"] {
  margin-left: 8px;
}

.rollout-tree a:hover {
  color: var(--wh-rollout-fg);
  background: var(--wh-rollout-panel-strong);
  text-decoration: none;
}

.rollout-tree details {
  border-left: 1px solid var(--wh-rollout-border-muted);
}

.rollout-tree details + details {
  margin-top: 2px;
}

.rollout-tree summary {
  display: grid;
  grid-template-columns: 14px minmax(0, 1fr);
  gap: 2px;
  padding: 3px 4px;
  cursor: pointer;
  list-style: none;
  border-radius: 5px;
}

.rollout-tree summary::-webkit-details-marker {
  display: none;
}

.rollout-tree summary::before {
  content: ">";
  color: var(--wh-rollout-subtle);
  display: inline-block;
}

.rollout-tree details[open] > summary::before {
  transform: rotate(90deg);
}

.rollout-tree-children {
  display: grid;
  gap: 1px;
  padding-left: 14px;
}

.rollout-nav-label {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.rollout-parse-errors {
  margin: 0 0 10px;
  padding: 8px 10px;
  border: 1px solid rgba(255, 107, 107, 0.4);
  border-left: 3px solid var(--wh-rollout-red);
  border-radius: 7px;
  background: rgba(255, 107, 107, 0.08);
}

.rollout-parse-errors h2 {
  margin: 0 0 6px;
  color: var(--wh-rollout-red);
  font-size: 13px;
}

.rollout-turn-list {
  display: grid;
  gap: 10px;
}

.rollout-turn {
  min-width: 0;
  border: 1px solid var(--wh-rollout-border-muted);
  border-radius: 8px;
  background: var(--wh-rollout-panel);
  overflow: clip;
}

.rollout-turn > summary {
  display: grid;
  grid-template-columns: 18px minmax(0, 1fr) max-content;
  gap: 8px;
  align-items: center;
  min-width: 0;
  padding: 8px 10px;
  cursor: pointer;
  list-style: none;
  background: var(--wh-rollout-panel-strong);
}

.rollout-turn > summary::-webkit-details-marker {
  display: none;
}

.rollout-turn > summary::before {
  content: ">";
  color: var(--wh-rollout-subtle);
  display: inline-block;
  font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
}

.rollout-turn[open] > summary::before {
  transform: rotate(90deg);
}

.rollout-turn-title {
  min-width: 0;
}

.rollout-turn-title h2 {
  margin: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 14px;
  line-height: 1.3;
}

.rollout-turn-body {
  min-width: 0;
}

.rollout-assistant-section {
  border-top: 1px solid var(--wh-rollout-border-muted);
}

.rollout-assistant-section > summary {
  display: grid;
  grid-template-columns: 18px minmax(0, 1fr) max-content;
  gap: 8px;
  align-items: center;
  min-width: 0;
  padding: 6px 10px;
  cursor: pointer;
  list-style: none;
  background: var(--wh-rollout-panel-soft);
}

.rollout-assistant-section > summary::-webkit-details-marker {
  display: none;
}

.rollout-assistant-section > summary::before {
  content: ">";
  display: inline-block;
  color: var(--wh-rollout-subtle);
  font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
}

.rollout-assistant-section[open] > summary::before {
  transform: rotate(90deg);
}

.rollout-assistant-title {
  min-width: 0;
  overflow-wrap: anywhere;
  color: var(--wh-rollout-fg);
  font-size: 13px;
  font-weight: 650;
}

.rollout-assistant-body {
  min-width: 0;
}

.rollout-compact-section {
  border-top: 1px solid var(--wh-rollout-border-muted);
}

.rollout-compact-section > summary {
  display: grid;
  grid-template-columns: 18px minmax(28px, 1fr) max-content minmax(28px, 1fr) max-content;
  gap: 8px;
  align-items: center;
  min-width: 0;
  padding: 7px 10px;
  cursor: pointer;
  list-style: none;
  background: rgba(210, 153, 34, 0.05);
}

.rollout-compact-section > summary::-webkit-details-marker {
  display: none;
}

.rollout-compact-section > summary::before {
  content: ">";
  display: inline-block;
  color: var(--wh-rollout-yellow);
  font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
}

.rollout-compact-section[open] > summary::before {
  transform: rotate(90deg);
}

.rollout-compact-rule {
  min-width: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(210, 153, 34, 0.65), transparent);
}

.rollout-compact-title {
  color: var(--wh-rollout-yellow);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0;
  text-transform: uppercase;
  white-space: nowrap;
}

.rollout-compact-body {
  min-width: 0;
  border-top: 1px dashed rgba(210, 153, 34, 0.25);
}

.rollout-entry {
  display: grid;
  grid-template-columns: 112px minmax(0, 1fr);
  gap: 8px;
  min-width: 0;
  padding: 7px 10px;
  border-top: 1px solid var(--wh-rollout-border-muted);
}

.rollout-entry:first-child {
  border-top: 0;
}

.rollout-entry-anchor {
  scroll-margin-top: 10px;
}

.rollout-entry-head {
  display: grid;
  align-content: start;
  gap: 4px;
  min-width: 0;
}

.rollout-entry-title {
  min-width: 0;
  font-size: 11px;
  color: var(--wh-rollout-subtle);
}

.rollout-entry-body {
  min-width: 0;
}

.rollout-role-user {
  border-color: rgba(88, 166, 255, 0.45);
  color: var(--wh-rollout-blue);
}

.rollout-role-assistant,
.rollout-role-agent {
  border-color: rgba(63, 185, 80, 0.45);
  color: var(--wh-rollout-green);
}

.rollout-role-tool {
  border-color: rgba(188, 140, 255, 0.45);
  color: var(--wh-rollout-purple);
}

.rollout-role-error {
  border-color: rgba(255, 107, 107, 0.55);
  color: var(--wh-rollout-red);
}

.rollout-role-event,
.rollout-role-session,
.rollout-role-turn,
.rollout-role-reasoning,
.rollout-role-system,
.rollout-role-developer {
  border-color: rgba(151, 163, 176, 0.35);
  color: var(--wh-rollout-muted);
}

.rollout-kv {
  display: grid;
  grid-template-columns: max-content minmax(0, 1fr);
  gap: 3px 8px;
  margin: 0;
}

.rollout-kv dt {
  color: var(--wh-rollout-subtle);
  font-weight: 650;
}

.rollout-kv dd {
  min-width: 0;
  margin: 0;
  overflow-wrap: anywhere;
}

.rollout-text {
  min-width: 0;
  margin: 0;
  white-space: pre-wrap;
  overflow-wrap: anywhere;
}

.rollout-content-block + .rollout-content-block,
.rollout-kv + .rollout-content-block,
.rollout-kv + pre,
pre + .rollout-kv,
.rollout-details + .rollout-details {
  margin-top: 7px;
}

.rollout-content-label {
  margin: 0 0 3px;
  color: var(--wh-rollout-subtle);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
}

.codex-rollout a {
  color: var(--wh-rollout-blue);
  text-decoration: none;
}

.codex-rollout a:hover {
  text-decoration: underline;
}

.codex-rollout pre {
  max-width: 100%;
  margin: 0;
  padding: 8px 9px;
  overflow: auto;
  color: #dbe7f3;
  background: #090d12;
  border: 1px solid var(--wh-rollout-border-muted);
